<svg xmlns="http://www.w3.org/2000/svg" width="990" height="1440" viewBox="0 0 990 1440">
  <style>
    .box { stroke: #111827; stroke-width: 4; rx: 14; filter: url(#shadow); }
    .client { fill: #40c7b8; }
    .security { fill: #fde68a; }
    .server { fill: #bbf7d0; }
    .proxy { fill: #fbcfe8; }
    .auth { fill: #e0f2fe; }
    .resources { fill: #ddd6fe; }
    .monitoring { fill: #93c5fd; }
    .note-block { fill: #f8fafc; }
    .lexique-block { fill: #f8fafc; }
    .title { font: 700 22px/1.2 "Segoe UI", Roboto, Arial; fill: #0f172a; }
    .note { font: 400 14px/1.2 "Segoe UI", Roboto, Arial; fill: #0f172a; }
    .small { font: 400 12px/1.2 "Segoe UI", Roboto, Arial; fill: #0f172a; }
    .arrow { stroke: #111827; stroke-width:4; fill:none; marker-end: url(#arrowhead); }
    .arrow-dashed { stroke: #111827; stroke-width:4; fill:none; stroke-dasharray:8,8; marker-end: url(#arrowhead); }
    .group-title { font: 700 16px/1.2 "Segoe UI", Roboto, Arial; fill: #0f172a; }
    .bg { fill: #f8fafc; }
    .main-title-bg { fill: #1e40af; }
    .main-title-text { font: 700 26px/1.2 "Segoe UI", Roboto, Arial; fill: #ffffff; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- Titre principal -->
  <g id="main-title">
    <rect x="0" y="0" width="990" height="40" class="main-title-bg" filter="none" />
    <text x="500" y="27" text-anchor="middle" class="main-title-text">Schéma de l'infrastructure pédagogique (version publique)</text>
  </g>

  <!-- Client -->
  <g id="client">
    <rect x="200" y="70" width="600" height="80" class="box client" />
    <text x="500" y="115" text-anchor="middle" class="title">Client (navigateur / mobile)</text>
  </g>

  <!-- Supervision externe -->
  <g id="supervision">
    <rect x="10" y="230" width="250" height="120" class="box monitoring" />
    <text x="135" y="265" text-anchor="middle" class="title">Supervision externe</text>
    <text x="135" y="285" text-anchor="middle" class="small">(vérifications HTTP/S périodiques)</text>
    <text x="135" y="305" text-anchor="middle" class="small">→ alertes configurées</text>
  </g>

  <!-- CDN / DNS (anonymisé) -->
  <g id="cdn">
    <rect x="300" y="230" width="550" height="120" class="box security" />
    <text x="575" y="265" text-anchor="middle" class="title">Service DNS &amp; CDN</text>
    <text x="575" y="290" text-anchor="middle" class="note">WAF de périmètre, règles de filtrage (niveau public)</text>
  </g>

  <!-- Serveur Web (anonymisé) -->
  <g id="webserver">
    <rect x="120" y="380" width="560" height="150" class="box server" />
    <text x="400" y="420" text-anchor="middle" class="title">Serveur Web (hébergement)</text>
    <text x="400" y="445" text-anchor="middle" class="note">Terminaison TLS, virtual hosts, protections au niveau serveur</text>
    <text x="400" y="465" text-anchor="middle" class="note">• Accès aux métriques réservé à l'équipe</text>
  </g>

  <!-- Dashboards (anonymisé) -->
  <g id="dashboards">
    <rect x="710" y="380" width="260" height="150" class="box monitoring" />
    <text x="840" y="410" text-anchor="middle" class="title">Tableaux de bord</text>
    <text x="840" y="430" text-anchor="middle" class="small">(visualisation des métriques)</text>
    <text x="840" y="450" text-anchor="middle" class="small">• Accès restreint</text>
    <text x="840" y="470" text-anchor="middle" class="small">• Pas d'information opérationnelle publique</text>
  </g>

  <!-- Proxy inverse (anonymisé) -->
  <g id="reverseproxy">
    <rect x="160" y="660" width="680" height="210" class="box proxy" />
    <text x="500" y="690" text-anchor="middle" class="title">Proxy inverse (couche sécurité)</text>
    <line x1="200" y1="705" x2="800" y2="705" stroke="#e6eef8" stroke-width="2" />
    <text x="320" y="750" text-anchor="middle" class="group-title">Filtrage applicatif</text>
    <text x="320" y="780" text-anchor="middle" class="small">• Validation d'accès</text>
    <text x="320" y="800" text-anchor="middle" class="small">• Durcissement des chemins exposés</text>
    <text x="320" y="820" text-anchor="middle" class="small">• Contrôles MIME et logging</text>
    <text x="680" y="750" text-anchor="middle" class="group-title">Transport</text>
    <text x="680" y="780" text-anchor="middle" class="small">• Transmission vers ressources internes</text>
    <text x="680" y="795" text-anchor="middle" class="small">• Masquage de l'arborescence réelle</text>
    <text x="680" y="820" text-anchor="middle" class="small">• Contrôle d'accès fin</text>
  </g>

  <!-- Auth (anonymisé) -->
  <g id="auth">
    <rect x="200" y="560" width="640" height="70" rx="10" class="box auth" />
    <text x="540" y="590" text-anchor="middle" class="title">Système d'authentification</text>
    <text x="540" y="610" text-anchor="middle" class="small">Sessions et contrôles internes → proxy s'appuie sur l'authentification</text>
  </g>

  <!-- Monitoring interne (anonymisé) -->
  <g id="monitoring_internal">
    <rect x="10" y="560" width="160" height="70" class="box monitoring" />
    <text x="90" y="585" text-anchor="middle" class="title">Monitoring</text>
    <text x="90" y="605" text-anchor="middle" class="small">Surveille état des services</text>
  </g>
  <path d="M180 595 L200 595" class="arrow" />

  <!-- Ressources protégées (anonymisé) -->
  <g id="resources">
    <rect x="160" y="900" width="680" height="70" class="box resources" />
    <text x="500" y="930" text-anchor="middle" class="title">Ressources pédagogiques protégées</text>
    <text x="500" y="950" text-anchor="middle" class="small">Accès uniquement via le proxy et contrôle d'autorisation</text>
  </g>

  <!-- Flèches simplifiées -->
  <path d="M575 350 L575 380" class="arrow" />
  <path d="M185 350 L185 380" class="arrow" />
  <path d="M710 455 L680 455" class="arrow" />
  <path d="M500 150 L500 230" class="arrow-dashed" />
  <path d="M500 520 L500 560" class="arrow" />
  <path d="M500 650 L500 660" class="arrow" />
  <path d="M500 890 L500 900" class="arrow" />

  <!-- Lexique public (anonymisé) -->
  <g id="lexique">
    <rect x="40" y="1040" width="920" height="380" rx="10" class="lexique-block" stroke="#111827" stroke-width="2" filter="none" />
    <text x="70" y="1070" class="title">Lexique</text>
    <text x="70" y="1100" class="group-title">Service DNS &amp; CDN</text>
    <text x="90" y="1120" class="note">• CDN : réseau de serveurs optimisant la distribution de contenus web.</text>
    <text x="90" y="1140" class="note">• DNS : système traduisant un nom de domaine en adresse IP.</text>
    <text x="70" y="1170" class="group-title">Serveur Web</text>
    <text x="90" y="1190" class="note">• Hébergement mutualisé ou dédié selon besoin.</text>
    <text x="90" y="1210" class="note">• TLS : chiffrement des échanges entre client et serveur.</text>
    <text x="70" y="1235" class="group-title">Gestion de contenu</text>
    <text x="90" y="1255" class="note">• CMS de documentation : système de publication orienté documentation.</text>
    <text x="90" y="1275" class="note">• Ressources protégées : contenus pédagogiques accessibles selon autorisation.</text>
    <text x="70" y="1295" class="group-title">Proxy inverse</text>
    <text x="90" y="1315" class="note">• Proxy : serveur intermédiaire filtrant et relayant les requêtes.</text>
    <text x="90" y="1335" class="note">• Filtrage : validation d'entrées, contrôle MIME et restrictions d'accès.</text>
    <text x="70" y="1355" class="group-title">Supervision</text>
    <text x="90" y="1375" class="note">• Supervision externe : vérifications périodiques de disponibilité.</text>
    <text x="90" y="1395" class="note">• Monitoring interne : tableaux de bord et alertes pour l'équipe technique.</text>
  </g>
</svg>
